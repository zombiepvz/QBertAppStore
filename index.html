<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My APK App Store</title>
<style>
body{font-family:Arial;margin:0;background:#f2f2f2}
header{background:#1e88e5;color:#fff;padding:15px;text-align:center;font-size:24px}
.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.app-card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.app-card img.icon{width:90px;height:90px;border-radius:20px;display:block;margin:auto}
.app-name{text-align:center;font-size:20px;margin:10px 0}
.rating{text-align:center;color:#ff9800;font-size:18px}
.carousel{position:relative;margin-top:10px}
.carousel img{width:100%;border-radius:10px;display:none}
.carousel img.active{display:block}
.carousel button{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);color:#fff;border:none;padding:5px 10px;cursor:pointer}
.prev{left:5px}
.next{right:5px}
.download-btn{display:block;text-align:center;margin-top:12px;padding:10px;background:#43a047;color:#fff;text-decoration:none;border-radius:8px;font-weight:bold}
</style>
</head>
<body>
<header>📦 My APK App Store</header>
<div class="container">

<div class="app-card">
<img class="icon" src="icons/app1.png">
<div class="app-name">My Cool App</div>
<div class="rating">★★★★★ (4.8)</div>

<div class="carousel">
<button class="prev" onclick="moveSlide(this,-1)">❮</button>
<img src="screens/app1-1.png" class="active">
<img src="screens/app1-2.png">
<img src="screens/app1-3.png">
<button class="next" onclick="moveSlide(this,1)">❯</button>
</div>

<a class="download-btn" href="apks/mycoolapp.apk" download>Download APK</a>
</div>

<div class="app-card">
<img class="icon" src="icons/app2.png">
<div class="app-name">Another App</div>
<div class="rating">★★★★☆ (4.2)</div>

<div class="carousel">
<button class="prev" onclick="moveSlide(this,-1)">❮</button>
<img src="screens/app2-1.png" class="active">
<img src="screens/app2-2.png">
<button class="next" onclick="moveSlide(this,1)">❯</button>
</div>

<a class="download-btn" href="apks/anotherapp.apk" download>Download APK</a>
</div>

</div>

<script>
function moveSlide(btn,dir){
const carousel=btn.parentElement;
const slides=carousel.querySelectorAll("img");
let index=[...slides].findIndex(s=>s.classList.contains("active"));
slides[index].classList.remove("active");
index=(index+dir+slides.length)%slides.length;
slides[index].classList.add("active");
}
</script>
</body>
</html>
